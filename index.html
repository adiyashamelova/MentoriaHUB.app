<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentoria Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // Бирюза Mentoria (кнопки, акценты)
              indigo: {
                50: '#EAF8F9',  
                100: '#CDECEB',
                500: '#00A896', 
                600: '#008F7E',
                900: '#0A1128',
              },
              // Голубой для градиентов
              purple: {
                400: '#38BDF8',
                500: '#0072FF', 
                600: '#005CE6',
              },
              // Глубокий синий и чистые фоны
              slate: {
                50: '#F8FAFC',
                800: '#152238', 
                900: '#0A1128', 
              }
            }
          }
        }
      }
    </script>

    <style>
      /* --- 1. ГЛОБАЛЬНЫЙ ФОН --- */
      body { background-color: #F4F9F9 !important; }
      body.dark { background-color: #0A1128 !important; }

      /* --- 2. СВЕТЛАЯ ТЕМА (Объемные 3D-карточки/ячейки) --- */
      html:not(.dark) .bg-slate-50, 
      html:not(.dark) .bg-white {
        background-color: #FFFFFF !important; 
        border: 1px solid #E0F2F1 !important; 
        box-shadow: 0 8px 24px rgba(0, 168, 150, 0.08) !important; 
      }

      /* --- 3. ТЕМНАЯ ТЕМА (Контрастные карточки с тенью) --- */
      .dark .dark\:bg-slate-800, 
      .dark .bg-slate-50, 
      .dark .bg-white {
        background-color: #152238 !important; 
        border: 1px solid #1E2D4A !important;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important; 
      }
    </style>
  </head>
  
  <body class="transition-colors duration-300 text-slate-900 dark:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
